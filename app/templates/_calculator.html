{# Reusable calculator partial. Used by both index.html and embed.html.
   Includes: form (occupant 1, optional occupant 2), result container,
   and the two <template> elements that ui.js clones at render time. #}

<form id="kua-form" class="kua-form" novalidate>
  <fieldset class="occupant" data-occupant="1">
    <legend class="visually-hidden">About you</legend>

    <div class="field field-date">
      <span class="field-label" id="date-1-label">Birth date</span>
      <div class="date-row" role="group" aria-labelledby="date-1-label" aria-describedby="date-1-help date-1-error">
        <label class="date-sub">
          <span class="date-sub-label">Year</span>
          <input
            id="year-1"
            name="year-1"
            type="number"
            inputmode="numeric"
            min="1900"
            max="2050"
            step="1"
            placeholder="1985"
            required>
        </label>
        <label class="date-sub">
          <span class="date-sub-label">Month</span>
          <select id="month-1" name="month-1" required>
            <option value="">--</option>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
          </select>
        </label>
        <label class="date-sub">
          <span class="date-sub-label">Day</span>
          <input
            id="day-1"
            name="day-1"
            type="number"
            inputmode="numeric"
            min="1"
            max="31"
            step="1"
            placeholder="15"
            required>
        </label>
      </div>
      <p id="date-1-help" class="field-help">Full date so we can handle the Chinese New Year boundary automatically. You don't need to look anything up.</p>
      <p id="date-1-error" class="field-error" aria-live="polite" hidden></p>
    </div>

    <div class="field field-gender">
      <span class="field-label" id="gender-1-label">Gender</span>
      <div class="radio-row" role="radiogroup" aria-labelledby="gender-1-label" aria-describedby="gender-1-error">
        <label class="radio">
          <input type="radio" name="gender-1" value="male" required>
          <span>Male</span>
        </label>
        <label class="radio">
          <input type="radio" name="gender-1" value="female">
          <span>Female</span>
        </label>
      </div>
      <p id="gender-1-error" class="field-error" aria-live="polite" hidden></p>
    </div>
  </fieldset>

  <div class="couples-toggle-row">
    <button type="button" id="couples-toggle" class="disclosure" aria-expanded="false" aria-controls="occupant-2">
      <span class="disclosure-icon" aria-hidden="true">+</span>
      <span class="disclosure-label">Add a second person (for couples and shared rooms)</span>
    </button>
  </div>

  <fieldset id="occupant-2" class="occupant occupant-secondary" data-occupant="2" hidden>
    <legend class="visually-hidden">About your partner or housemate</legend>

    <div class="field field-date">
      <span class="field-label" id="date-2-label">Birth date</span>
      <div class="date-row" role="group" aria-labelledby="date-2-label" aria-describedby="date-2-error">
        <label class="date-sub">
          <span class="date-sub-label">Year</span>
          <input id="year-2" name="year-2" type="number" inputmode="numeric" min="1900" max="2050" step="1" placeholder="1986">
        </label>
        <label class="date-sub">
          <span class="date-sub-label">Month</span>
          <select id="month-2" name="month-2">
            <option value="">--</option>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
          </select>
        </label>
        <label class="date-sub">
          <span class="date-sub-label">Day</span>
          <input id="day-2" name="day-2" type="number" inputmode="numeric" min="1" max="31" step="1" placeholder="15">
        </label>
      </div>
      <p id="date-2-error" class="field-error" aria-live="polite" hidden></p>
    </div>

    <div class="field field-gender">
      <span class="field-label" id="gender-2-label">Gender</span>
      <div class="radio-row" role="radiogroup" aria-labelledby="gender-2-label" aria-describedby="gender-2-error">
        <label class="radio">
          <input type="radio" name="gender-2" value="male">
          <span>Male</span>
        </label>
        <label class="radio">
          <input type="radio" name="gender-2" value="female">
          <span>Female</span>
        </label>
      </div>
      <p id="gender-2-error" class="field-error" aria-live="polite" hidden></p>
    </div>
  </fieldset>

  <div class="form-actions">
    <button type="submit" class="cta-primary">Calculate my Kua number</button>
    <p class="privacy-note">Calculation runs in your browser. We never see your birth data.</p>
  </div>
</form>

<section id="result" class="result" aria-live="polite" hidden>
  <!-- Populated by ui.js -->
</section>

<template id="result-template">
  <article class="result-card">
    <header class="result-header">
      <div class="result-summary">
        <p class="result-eyebrow">Your Kua</p>
        <p class="result-kua"><span data-bind="kua"></span></p>
        <p class="result-group"><span class="group-badge" data-bind="group-badge"></span></p>
      </div>
      <p class="result-line" data-bind="summary"></p>
    </header>

    <p class="cny-notice" data-bind="cny-notice" hidden></p>

    <h2 class="result-subhead">Your eight personal directions</h2>
    <ol class="direction-list" data-bind="directions"></ol>

    <aside class="methodology-strip">
      <h3>Want the methodology?</h3>
      <p>Read the full deep-dive on the Compass School and the Eight Mansions system that produces this result.</p>
      <p class="strip-links">
        <a href="/methodology#5-the-kua-number" target="_blank" rel="noopener">How the Kua number works</a>
        <a href="/methodology#east-group-and-west-group" target="_blank" rel="noopener">East and West groups</a>
        <a href="/methodology#6-the-eight-mansions-ba-zhai" target="_blank" rel="noopener">The Eight Mansions</a>
      </p>
    </aside>
  </article>
</template>

<template id="direction-row-template">
  <li class="direction-row" data-favourable="">
    <div class="direction-compass">
      <span class="direction-arrow" aria-hidden="true"></span>
      <span class="direction-label" data-bind="compassLabel"></span>
    </div>
    <div class="direction-quality">
      <p class="quality-pinyin"><span data-bind="pinyin"></span> <span class="quality-hanzi" data-bind="hanzi" aria-hidden="true"></span></p>
      <p class="quality-gloss" data-bind="gloss"></p>
    </div>
    <p class="direction-meaning" data-bind="meaning"></p>
    <p class="direction-badge"><span data-bind="badge"></span></p>
  </li>
</template>
